general:
  time_range: ["2024-01-01", "2024-12-31"]
  random_seed: 42
  practice_output_dir: "data/practice"
  capstone_output_dir: "data/capstone"

users:
  n_users: 50000
  acquisition_channels:
    organic: 0.30
    paid_search: 0.25
    social: 0.15
    referral: 0.10
    email: 0.10
    tiktok_ads: 0.10
  tiktok_launch_date: "2024-06-01"
  tiktok_post_launch_share: 0.35
  countries:
    US: 0.65
    UK: 0.12
    CA: 0.08
    DE: 0.07
    AU: 0.05
    other: 0.03
  devices:
    web: 0.40
    ios: 0.35
    android: 0.25
  age_buckets:
    "18-24": 0.15
    "25-34": 0.30
    "35-44": 0.25
    "45-54": 0.18
    "55+": 0.12
  gender:
    M: 0.48
    F: 0.47
    other: 0.03
    unknown: 0.02
  signup_curve: "linear_growth"

products:
  n_products: 500
  categories:
    electronics: 0.20
    home: 0.20
    clothing: 0.25
    beauty: 0.15
    sports: 0.10
    books: 0.10
  subcategories:
    electronics: [headphones, laptops, cameras, tablets, accessories, speakers]
    home: [bedding, kitchen, storage, decor, cleaning, lighting]
    clothing: [tops, pants, dresses, outerwear, shoes, accessories]
    beauty: [skincare, makeup, haircare, fragrance, tools, supplements]
    sports: [running_shoes, fitness, outdoor, team_sports, cycling, yoga]
    books: [fiction, nonfiction, business, tech, self_help, cooking]
  price_range: [5.99, 499.99]
  price_distribution: "lognormal"
  price_lognormal_mu: 3.5
  price_lognormal_sigma: 0.8
  cost_margin_range: [0.40, 0.70]
  plus_eligible_pct: 0.80

sessions:
  avg_sessions_per_user_per_month: 4.5
  session_duration_minutes:
    mean: 12
    std: 8
    min: 1
    max: 60
  events_per_session:
    mean: 5
    std: 3
    min: 1
    max: 25

funnel:
  product_view_to_add_to_cart: 0.25
  add_to_cart_to_checkout: 0.55
  checkout_to_payment: 0.80
  payment_to_purchase: 0.90
  mobile_checkout_penalty: 0.60

activation:
  organic: 0.40
  paid_search: 0.35
  social: 0.25
  referral: 0.45
  email: 0.30
  tiktok_ads: 0.12

membership:
  trial_rate: 0.08
  trial_to_paid_rate: 0.45
  monthly_churn_rate: 0.05
  annual_churn_rate: 0.02
  plan_split:
    monthly: 0.60
    annual: 0.40

support_tickets:
  base_rate_per_1000_users_per_day: 2.5
  category_distribution:
    payment_issue: 0.25
    delivery_issue: 0.30
    product_quality: 0.20
    account_issue: 0.15
    membership_issue: 0.05
    other: 0.05
  severity_distribution:
    low: 0.40
    medium: 0.35
    high: 0.20
    critical: 0.05
  resolution_hours:
    mean: 24
    std: 12
    min: 1
    max: 72

nps:
  free_nps_q1: 28
  free_nps_q2: 30
  plus_nps_q1: 52
  plus_nps_q2: 54
  responses_per_quarter: 2000
  q1_free_response_pct: 0.40
  q2_free_response_pct: 0.60
  q3_free_response_pct: 0.50
  q4_free_response_pct: 0.50
  comment_rate: 0.30

orders:
  items_per_order:
    mean: 2
    min: 1
    max: 4
  status_distribution:
    completed: 0.85
    cancelled: 0.10
    returned: 0.05
  shipping_non_plus: 5.99
  target_aov: 75.0

stories:
  ticket_spike:
    start: "2024-06-01"
    end: "2024-06-14"
    multiplier: 3.0
    category: "payment_issue"
    device: "ios"
    app_version: "2.3.0"

  activation_drop:
    target_pre_activation: 0.30
    target_post_activation: 0.24

  nps_paradox: {}

  power_user_fallacy:
    experiment_id: 1
    experiment_start: "2024-08-01"
    experiment_end: "2024-09-30"
    n_experiment_users: 10000
    observational_correlation: 3.0
    true_causal_effect: 0.08
    control_purchase_rate: 0.153
    treatment_purchase_rate: 0.165

  checkout_confound:
    experiment_id: 2
    redesign_date: "2024-11-20"
    promo_start: "2024-11-25"
    promo_end: "2024-12-01"
    mobile_cvr_baseline: 0.060
    mobile_cvr_redesign: 0.065
    desktop_cvr_baseline: 0.100
    promo_effect_pp: 0.030
    n_experiment_users: 10000

  mobile_gap:
    mobile_checkout_cvr: 0.060
    desktop_checkout_cvr: 0.100
    monthly_mobile_checkouts: 50000

app_versions:
  ios:
    - {version: "2.1.0", start: "2024-01-01", end: "2024-03-31"}
    - {version: "2.2.0", start: "2024-04-01", end: "2024-05-31"}
    - {version: "2.3.0", start: "2024-06-01", end: "2024-06-30"}
    - {version: "2.4.0", start: "2024-07-01", end: "2024-12-31"}
  android:
    - {version: "3.1.0", start: "2024-01-01", end: "2024-06-30"}
    - {version: "3.2.0", start: "2024-07-01", end: "2024-12-31"}

promotions:
  - {promo_id: 1, name: "Summer Sale", type: "percentage_off", discount: 0.15, start: "2024-07-01", end: "2024-07-14", target: "all"}
  - {promo_id: 2, name: "Back to School", type: "percentage_off", discount: 0.10, start: "2024-08-15", end: "2024-08-31", target: "all"}
  - {promo_id: 3, name: "Black Friday", type: "percentage_off", discount: 0.25, start: "2024-11-25", end: "2024-12-01", target: "all"}
  - {promo_id: 4, name: "Holiday Sale", type: "percentage_off", discount: 0.20, start: "2024-12-15", end: "2024-12-31", target: "all"}
  - {promo_id: 5, name: "Welcome10", type: "percentage_off", discount: 0.10, start: "2024-01-01", end: "2024-12-31", target: "new_users"}

experiments:
  - experiment_id: 1
    experiment_name: "save_for_later_visibility"
    hypothesis: "Increasing visibility of Save for Later will increase 30-day purchase rate by 15%"
    primary_metric: "purchase_rate"
    guardrail_metrics: "aov,support_tickets,page_load"
    start_date: "2024-08-01"
    end_date: "2024-09-30"
    status: "completed"
  - experiment_id: 2
    experiment_name: "checkout_redesign"
    hypothesis: "Simplified mobile checkout will increase mobile checkout conversion by 10%"
    primary_metric: "checkout_conversion"
    guardrail_metrics: "aov,support_tickets,page_load"
    start_date: "2024-11-20"
    end_date: "2024-12-31"
    status: "completed"

capstone:
  time_range: ["2023-01-01", "2023-12-31"]
  random_seed: 123
  landmines:
    duplicate_android_events_pct: 0.02
    missing_ios_events_window: ["2024-10-01", "2024-10-07"]
    delayed_timestamp_pct: 0.03
    delayed_timestamp_shift_hours: 7
    unstitched_sessions_pct: 0.05
    orphan_order_pct: 0.01
  structural:
    remove_sessions_table: true
    remove_nps_user_segment: true
    null_support_device_pct: 0.30
